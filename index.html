<!DOCTYPE html>
<html>
<head>
  <title>Working Player</title>
</head>
<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

<h1>🎧 Audio Test</h1>

<audio id="audio" controls style="width:300px;"></audio>
<br><br>

<button onclick="playTest()">Play Test Song</button>

<script>
const audio = document.getElementById("audio");

function playTest() {
  audio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
  audio.play();
}
</script>

</body>
</html>
